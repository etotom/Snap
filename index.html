    <style>
        /* Добавляем новые стили для улучшенного вида */
        body {
            overflow-x: hidden;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .make {
            margin-top: 80px; /* Учитываем фиксированный header */
        }
        
        /* Эффекты для изображений */
        .imgg img {
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Плавные переходы для всех элементов */
        * {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
    <title>Snap - Modern Web Design</title>
</head>
